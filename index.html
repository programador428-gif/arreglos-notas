<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Notas | Dark Pink</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="main-container">
    <section class="glass-card">
      <header class="header">
        <h1>Mis Notas</h1>
      </header>

      <div class="column-layout">
        <div class="input-section">
          <input type="text" id="txtNota" placeholder="Escribe tu nota..." class="input-field">
          <button onclick="probarAgregar()" class="btn btn-add">Agregar Nota</button>
        </div>

        <div class="actions-section">
          <button onclick="agregarElemento()" class="btn btn-test">Prueba 1</button>
          <button onclick="recorrerArreglo()" class="btn btn-print">Imprimir</button>
          <button onclick="generarTabla()" class="btn btn-trigger">GENERAR TABLA</button>
          <button onclick="mostrarNota()" class="btn btn-show">MOSTRAR NOTAS</button>
        </div>
      </div>
      <div id="divTabla"></div>
    </section>
  </main>

  <script src="js/utilitario.js"></script>
  <script src="js/ejercicio1.js"></script>
</body>

</html>
